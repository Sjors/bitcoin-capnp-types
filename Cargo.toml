[package]
name = "bitcoin-capnp-types"
version = "0.2.1"
edition = "2024"
authors = ["Rob <rob@2140.dev>"]
license = "CC0-1.0"
description = "Auto-generated types according to Bitcoin Core Cap'n Proto schemas"
repository = "https://github.com/2140-dev/bitcoin-capnp-types.git"
readme = "README.md"
keywords = ["bitcoin"]
categories = ["cryptography::cryptocurrencies"]
rust-version = "1.85.0"

[dependencies]
capnp = "0.25.0"
capnp-rpc = "0.25.0"

[build-dependencies]
capnpc = "0.25.0"

[dev-dependencies]
bitcoin = { git = "https://github.com/rust-bitcoin/rust-bitcoin", package = "bitcoin", tag = "bitcoin-0.33.0-beta" }
bitcoin-primitives = { git = "https://github.com/rust-bitcoin/rust-bitcoin", package = "bitcoin-primitives", tag = "bitcoin-0.33.0-beta" }
encoding = { git = "https://github.com/rust-bitcoin/rust-bitcoin", package = "bitcoin-consensus-encoding", tag = "bitcoin-0.33.0-beta" }
futures = "0.3.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serial_test = "3"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "io-util", "time"] }
tokio-util = { version = "0.7.16", features = ["compat"] }
